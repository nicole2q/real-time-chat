version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: chat-app-mongodb
    environment:
      MONGO_INITDB_DATABASE: chat-app
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - chat-app-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-app-server
    environment:
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
      MONGODB_URI: mongodb://mongodb:27017/chat-app
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - chat-app-network

  nginx:
    image: nginx:alpine
    container_name: chat-app-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/build:/usr/share/nginx/html:ro
    depends_on:
      - server
    networks:
      - chat-app-network

volumes:
  mongodb_data:

networks:
  chat-app-network:
    driver: bridge
